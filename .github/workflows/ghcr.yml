name: 🐳 Docker (Multi-Arch)

on:
  workflow_dispatch: {}
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    tags: ["*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: hurt6465-ai/tangsengdaodaoserver

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐹 Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
          cache: true

      - name: 🧱 Build binaries
        shell: bash
        run: |
          set -euo pipefail
          GIT_COMMIT="$(git rev-parse HEAD)"
          GIT_COMMIT_DATE="$(git log --date=iso8601-strict -1 --pretty=%ct)"
          GIT_VERSION="$(git describe --tags --abbrev=0 2>/dev/null || echo sso-chatrooms)"
          if [ -n "$(git status --porcelain)" ]; then
            GIT_TREE_STATE="dirty"
          else
            GIT_TREE_STATE="clean"
          fi
          LDFLAGS="-w -extldflags '-static' -X main.Commit=${GIT_COMMIT} -X main.CommitDate=${GIT_COMMIT_DATE} -X main.Version=${GIT_VERSION} -X main.TreeState=${GIT_TREE_STATE}"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -installsuffix cgo -o linux_amd64 ./main.go
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -installsuffix cgo -o linux_arm64 ./main.go
          chmod +x linux_amd64 linux_arm64

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          install: true
          use: true

      - name: 🔐 Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=sso-chatrooms,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr

      - name: 🚀 Build and push Docker image (Multi-Arch)
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.ghcr
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
